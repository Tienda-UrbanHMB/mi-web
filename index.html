<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Joshua</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.5rem; color: #ff4757; font-weight: bold; margin-bottom: 30px; }
        .botones { display: flex; gap: 20px; }
        button { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.1); background: #ff6b81; }
    </style>
</head>
<body>
    <h1>Bienvenido a mi página, me llamo Joshua</h1>
    <p>¿Eres gay?</p>
    <div class="botones">
        <button onclick="alert('¡Lo sabía!')">SÍ</button>
        <button onclick="alert('Mientes...')">NO</button>
    </div>
</body>
</html>
